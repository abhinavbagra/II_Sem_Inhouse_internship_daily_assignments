<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live User Directory | Pro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-gradient">
            <i class="fa-solid fa-users-viewfinder me-2"></i>Live User Directory
        </h1>
        <p class="text-muted">Real-time dynamic employee metric overview</p>
    </div>

    <div class="row g-3 mb-4 align-items-center">
        <div class="col-md-8">
            <div class="input-group search-group shadow-sm">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-magnifying-glass"></i></span>
                <input type="text" id="searchBox" class="form-control border-start-0" placeholder="Search user by parameter or name...">
            </div>
        </div>
        <div class="col-md-4">
            <button class="btn btn-action w-100 shadow-sm" id="sortBtn">
                <i class="fa-solid fa-sort-alpha-down me-2"></i>Sort Alphabetical (A-Z)
            </button>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4 px-2">
        <h5 class="text-secondary mb-0 fw-medium">
            Active Registry Nodes: 
            <span class="badge badge-count ms-2" id="count">0</span>
        </h5>
    </div>

    <div id="loading" class="my-5 text-center">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <div class="fw-semibold text-secondary">Compiling user database...</div>
    </div>

    <div class="row g-4" id="userContainer"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>
</html>
