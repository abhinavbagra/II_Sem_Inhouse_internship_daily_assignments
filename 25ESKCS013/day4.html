<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Landing Page</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
transition:.4s;
}

.dark{
background:#222;
color:white;
}

header{
background:#0077ff;
color:white;
padding:20px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
}

.hero{
padding:80px 20px;
text-align:center;
}

button{
padding:10px 20px;
background:#0077ff;
color:white;
border:none;
cursor:pointer;
margin-top:15px;
transition:.3s;
}

button:hover{
background:#ff6600;
transform:scale(1.1);
}

.container{
width:80%;
max-width:500px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.dark .container{
background:#333;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

p{
margin-top:15px;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body>

<header>
<h1>My Landing Page</h1>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h2>Welcome to My Website</h2>
<p>JavaScript Interactive Assignment</p>

<button onclick="toggleMode()">Dark Mode</button>
</section>

<div class="container">

<h2>Contact Form</h2>

<input type="text" id="name" placeholder="Enter your name">

<input type="email" id="email" placeholder="Enter your email">

<button onclick="submitForm()">Submit</button>

<p id="message"></p>

</div>

<script>

function submitForm(){

let name=document.getElementById("name").value.trim();

let email=document.getElementById("email").value.trim();

let msg=document.getElementById("message");

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(name===""){
msg.style.color="red";
msg.innerHTML="Please enter your name.";
return;
}

if(!email.match(emailPattern)){
msg.style.color="red";
msg.innerHTML="Please enter a valid email.";
return;
}

msg.style.color="green";
msg.innerHTML="Welcome, "+name+"! Your form has been submitted.";

}

function toggleMode(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
