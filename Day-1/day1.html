<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Challenge - College Admission Form</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --radius: 8px;
            --transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Form Card Container */
        .form-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .form-header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Logical Field Grouping */
        fieldset {
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fafafa;
        }

        legend {
            font-weight: 600;
            color: var(--primary-color);
            padding: 0 10px;
            font-size: 1.1rem;
        }

        /* Grid Layout for Fields */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Form Controls */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 0.95rem;
            background-color: #fff;
            color: var(--text-main);
            transition: var(--transition);
            outline: none;
        }

        /* Hover & Focus Effects */
        input:hover, select:hover, textarea:hover {
            border-color: #94a3b8;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 233, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Submit Button with Hover Effects */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 233, 0.2);
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px -2px rgba(37, 99, 233, 0.3);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            .form-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h1>College Admission Form</h1>
            <p>Please fill out the form below to register your application.</p>
        </div>

        <form action="#" method="POST">
            
            <!-- SECTION 1: Personal Details -->
            <fieldset>
                <legend>Personal Information</legend>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" placeholder="John" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="9876543210" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- SECTION 2: Academic Program Selection -->
            <fieldset>
                <legend>Academic Preferences</legend>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="course">Desired Course / Branch *</label>
                        <select id="course" name="course" required>
                            <option value="" disabled selected>Choose a program...</option>
                            <option value="cse">B.Tech - Computer Science & Engineering</option>
                            <option value="ece">B.Tech - Electronics & Communication</option>
                            <option value="it">B.Tech - Information Technology</option>
                            <option value="me">B.Tech - Mechanical Engineering</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="score">High School / 12th Percentage (%) *</label>
                        <input type="number" id="score" name="score" placeholder="e.g. 85" min="0" max="100" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="year">Year of Passing *</label>
                        <input type="number" id="year" name="year" placeholder="2026" min="2020" max="2026" required>
                    </div>
                </div>
            </fieldset>

            <!-- SECTION 3: Additional Info -->
            <fieldset>
                <legend>Additional Details</legend>
                <div class="form-group">
                    <label for="address">Permanent Address</label>
                    <textarea id="address" name="address" placeholder="Enter your full street address, city, state, and zip code..."></textarea>
                </div>
            </fieldset>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Submit Application</button>

        </form>
    </div>

</body>
</html>
